name: Blog Auto Publish

# 이 워크플로우는 참고용입니다.
# Claude Code CLI는 로컬에서만 실행 가능하므로,
# 자동화는 맥의 crontab이나 launchd를 사용합니다.
# 아래 로컬 자동화 설정을 참고하세요.

# === 로컬 자동화 (crontab) ===
# 터미널에서 crontab -e 실행 후 아래 추가:
# 월/수/금 오전 9시 자동 실행
# 0 9 * * 1,3,5 cd /Users/baosuji/Desktop/project/Blog_AI && /usr/bin/python3 -m src.main >> logs/cron.log 2>&1

on:
  workflow_dispatch:  # 수동 실행용 (참고)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - run: echo "로컬 Claude Code CLI 기반이므로, 맥 crontab으로 자동화하세요."
